- package:
    name: fdfind
    type: virtual

- template:
    params: [version]
    package:
      name: fdfind-github-$version
      source:
        - type: github
          user: sharkfd

    source:
      type: github
      user: sharkfd
      tag: v$version
      version: $version
      assets:
        - name: fd-v10.4.2-x86_64-unknown-linux-musl.tar.gz
          strip: 1
          files:
            - name: fd
              dest: bin



